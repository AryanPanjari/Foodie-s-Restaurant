<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <header>
        <h1>Foodie's Restaurant</h1>
        <a href="../home/index.html">Home</a>
    </header>
    <div class="demo-notice">
  🚧 Demo Mode — Connect to a live server to see cart items populated from the database.
    </div>
    <div class="cart-container">
        <h2>Your Cart</h2>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="cart-items">
            </tbody>
        </table>
        <div class="summary">
            <h3>Total Amount: Rs <span id="grand-total">0</span></h3>
            <button id="proceed-btn">Proceed to Payment</button>
        </div>
    </div>
    <script src="cart.js"></script>
</body>
</html>
